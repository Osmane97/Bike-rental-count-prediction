name: CI/CD Pipeline - Bike Rental Prediction

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ------------------------
      # Backend (FastAPI)
      # ------------------------
      - name: Build, Tag, and Push bike-api
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY=bike-api

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f backend/Dockerfile.fastapi ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # ------------------------
      # Frontend (Streamlit)
      # ------------------------
      - name: Build, Tag, and Push bike-streamlit
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY=bike-streamlit

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f frontend/Dockerfile.streamlit ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # ------------------------
      # Deploy to ECS
      # ------------------------
      - name: Deploy bike-api-service
        run: |
          aws ecs update-service \
            --cluster bike-cluster \
            --service bike-api-service \
            --force-new-deployment

      - name: Deploy bike-streamlit-service
        run: |
          aws ecs update-service \
            --cluster bike-cluster \
            --service bike-streamlit-service \
            --force-new-deployment